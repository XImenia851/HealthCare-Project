<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifier un patient - HealthCare</title>
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>

<body>
<div class="layout">

    <div th:replace="layout/fragments :: sidebar"></div>

    <main class="main-content">

        <section class="welcome-section">
            <h1 th:text="'Modifier : ' + ${patientEdit.firstName} + ' ' + ${patientEdit.lastName}">
                Modifier un patient
            </h1>
            <p>Modifiez les informations du patient puis enregistrez.</p>
        </section>

        <div class="panel" style="max-width: 680px;">

            <form th:action="@{/patients/edit/{id}(id=${patientEdit.id})}"
                  th:object="${patientEdit}"
                  method="post">

                <div class="form-row">
                    <div class="form-group">
                        <label>Prénom</label>
                        <input type="text" th:field="*{firstName}"
                               class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Nom</label>
                        <input type="text" th:field="*{lastName}"
                               class="form-control" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" th:field="*{email}"
                           class="form-control" required>
                </div>

                <div class="form-group">
                    <label>Téléphone</label>
                    <input type="text" th:field="*{phoneNumber}"
                           class="form-control" pattern="[0-9]{10}" required>
                </div>

                <div class="form-group">
                    <label>Adresse</label>
                    <input type="text" th:field="*{address}"
                           class="form-control" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Genre</label>
                        <select th:field="*{gender}" class="form-control">
                            <option value="Homme">Homme</option>
                            <option value="Femme">Femme</option>
                            <option value="Autre">Autre</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Date de naissance</label>
                        <input type="date" th:field="*{birthDate}"
                               class="form-control" required>
                    </div>
                </div>

                <div class="form-actions">
                    <a th:href="@{/dashboard}" class="btn-cancel">Annuler</a>
                    <button type="submit" class="btn-save">Enregistrer</button>
                </div>

            </form>
        </div>

    </main>
</div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil - HealthCare</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/profil.css}">
</head>

<body>

<div class="layout">

    <!-- Sidebar partagée -->
    <div th:replace="layout/fragments :: sidebar"></div>

    <main class="main-content">

        <div class="page-header">
            <div>
                <h1>Mon profil</h1>
                <p>Consultez vos informations personnelles.</p>
            </div>
        </div>

        <section class="profile-container">
            <div class="profile-card">

                <div class="profile-header">
                    <div class="avatar">
                        <span th:text="${patient.firstName.substring(0,1)} + ${patient.lastName.substring(0,1)}">JD</span>
                    </div>
                    <div class="profile-info">
                        <h2 th:text="${patient.firstName} + ' ' + ${patient.lastName}">John Doe</h2>
                    </div>
                </div>

                <div class="profile-grid">

                    <div class="info-group">
                        <label>Téléphone</label>
                        <div class="info-box" th:text="${patient.phoneNumber}">0600000000</div>
                    </div>

                    <div class="info-group">
                        <label>Adresse</label>
                        <div class="info-box" th:text="${patient.address}">Adresse</div>
                    </div>

                    <div class="info-group">
                        <label>Genre</label>
                        <div class="info-box" th:text="${patient.gender}">Homme</div>
                    </div>

                    <div class="info-group full-width">
                        <label>Date de naissance</label>
                        <div class="info-box" th:text="${patient.birthDate}">2000-01-01</div>
                    </div>

                </div>

                <div class="actions">
                    <a th:href="@{/profile/edit}" class="edit-btn">Modifier le profil</a>
                </div>

            </div>
        </section>

    </main>

</div>

</body>
</html>

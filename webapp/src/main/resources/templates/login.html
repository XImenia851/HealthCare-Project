<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Connexion - HealthCare</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
</head>
<body>

<div th:replace="layout/fragments :: header"></div>

<div class="container">
    <div class="card">
        <div class="card-header">
            <h3>Connexion</h3>
        </div>
        <div class="card-body">

            <div th:if="${param.success}" class="alert-success">
                Inscription réussie ! Vous pouvez vous connecter.
            </div>

            <div th:if="${param.error}" class="alert-danger">
                Email ou mot de passe incorrect.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="username" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Mot de passe</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn">Se connecter</button>
            </form>
            <hr>
            <p class="text-center">Nouveau patient ? <a th:href="@{/signUp}">Créez un compte ici</a></p>
        </div>
    </div>
</div>

</body>
</html>

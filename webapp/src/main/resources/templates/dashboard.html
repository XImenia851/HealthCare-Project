<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - HealthCare</title>
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>

<body>
<div class="layout">

    <div th:replace="layout/fragments :: sidebar"></div>

    <main class="main-content">

        <section class="welcome-section">
            <h1 th:text="'Bonjour, ' + ${patient.firstName} + ' ' + ${patient.lastName}">Bonjour</h1>
            <p>Bienvenue sur votre espace de santé.</p>
        </section>

        <div class="panel">
            <div class="panel-header">
                <h3>Liste des patients</h3>
                <span class="patient-count"
                      th:text="${#lists.size(patients)} + ' patients'">0 patients</span>
            </div>

            <table class="data-table">
                <thead>
                <tr>
                    <th>Nom</th>
                    <th>Email</th>
                    <th>Téléphone</th>
                    <th>Genre</th>
                    <th>Naissance</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${patients}">
                    <td th:text="${p.firstName} + ' ' + ${p.lastName}">Nom Prénom</td>
                    <td th:text="${p.email}">email@mail.com</td>
                    <td th:text="${p.phoneNumber}">0600000000</td>
                    <td th:text="${p.gender}">Genre</td>
                    <td th:text="${p.birthDate}">2000-01-01</td>
                    <td class="actions-cell">
                        <a th:href="@{/patients/edit/{id}(id=${p.id})}"
                           class="btn-edit">Modifier</a>

                        <form th:action="@{/patients/delete/{id}(id=${p.id})}"
                              method="post"
                              onsubmit="return confirm('Supprimer ce patient ?')">
                            <button type="submit" class="btn-delete">Supprimer</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(patients)}">
                    <td colspan="6" class="empty-row">Aucun patient enregistré.</td>
                </tr>
                </tbody>
            </table>
        </div>

    </main>
</div>
</body>
</html>

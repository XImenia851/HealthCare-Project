<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Inscription - HealthCare</title>
    <link rel="stylesheet" th:href="@{/css/signup.css}">
</head>
<body>
<div class="container">
    <div class="card">
        <div class="card-header">
            <h3>Inscription Patient</h3>
        </div>
        <div class="card-body">

            <div th:if="${error}" class="alert-danger" th:text="${error}"></div>

            <form th:action="@{/signUp}" th:object="${patient}" method="post">
                <div class="form-row">
                    <div class="form-group">
                        <label>Prénom</label>
                        <input type="text" th:field="*{firstName}" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Nom</label>
                        <input type="text" th:field="*{lastName}" class="form-control" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" th:field="*{email}" class="form-control" required>
                </div>

                <div class="form-group">
                    <label>Mot de Passe</label>
                    <input type="password" th:field="*{password}" class="form-control" required>
                </div>

                <div class="form-group">
                    <label>Téléphone (10 chiffres)</label>
                    <input type="text" th:field="*{phoneNumber}" class="form-control" pattern="[0-9]{10}" required>
                </div>

                <div class="form-group">
                    <label>Adresse</label>
                    <input type="text" th:field="*{address}" class="form-control" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Genre</label>
                        <select th:field="*{gender}" class="form-select" required>
                            <option value="">Choisir...</option>
                            <option value="Homme">Homme</option>
                            <option value="Femme">Femme</option>
                            <option value="Autre">Autre</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Date de naissance</label>
                        <input type="date" th:field="*{birthDate}" class="form-control" required>
                    </div>
                </div>

                <button type="submit" class="btn">S'inscrire</button>
            </form>
            <hr>
            <p class="text-center">Déjà inscrit ? <a th:href="@{/login}">Connectez-vous ici</a></p>
        </div>
    </div>
</div>
</body>
</html>
